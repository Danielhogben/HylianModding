name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Check for large files that shouldn't be committed
  file-size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          echo "Checking for files larger than 100MB..."
          LARGE_FILES=$(find . -type f -size +100M -not -path "./.git/*" 2>/dev/null)
          if [ -n "$LARGE_FILES" ]; then
            echo "ERROR: Found files larger than 100MB:"
            echo "$LARGE_FILES"
            exit 1
          fi
          echo "No large files found."

      - name: Check for ROM files
        run: |
          ROM_FILES=$(find . -type f \( -name "*.z64" -o -name "*.n64" -o -name "*.v64" -o -name "*.gba" -o -name "*.nds" -o -name "*.iso" -o -name "*.bin" -o -name "*.rom" \) -not -path "./.git/*" 2>/dev/null)
          if [ -n "$ROM_FILES" ]; then
            echo "ERROR: Found ROM files (should not be committed):"
            echo "$ROM_FILES"
            exit 1
          fi
          echo "No ROM files found."

  # Check for secrets/credentials
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns
          if grep -r --include="*.py" --include="*.js" --include="*.yml" --include="*.yaml" --include="*.json" \
            -E "(password|secret|token|key|api_key)\s*=\s*['\"][^'\"]+['\"]" \
            --exclude-dir=.git --exclude-dir=venv --exclude-dir=node_modules \
            . 2>/dev/null | grep -v "example\|test\|dummy\|placeholder\|TODO\|FIXME"; then
            echo "WARNING: Potential secrets found. Please review."
            echo "If these are false positives, add to .gitignore or use environment variables."
          fi
          echo "Secret scan complete."

  # Python linting (if Python files exist)
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 isort

      - name: Check Python files
        run: |
          PYTHON_FILES=$(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "*/__pycache__/*" 2>/dev/null)
          if [ -n "$PYTHON_FILES" ]; then
            echo "Found Python files, running linting..."
            flake8 . --max-line-length=120 --exclude=.git,venv,__pycache__,node_modules --count --statistics || true
            isort . --check-only --diff --skip .git --skip venv --skip __pycache__ || true
          else
            echo "No Python files found, skipping linting."
          fi

  # Markdown linting
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  # Structure validation
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          echo "Validating project structure..."
          REQUIRED_FILES=("README.md" "LICENSE" "CONTRIBUTING.md" ".gitignore")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Check directory naming
        run: |
          # Ensure no directories with problematic characters
          BAD_DIRS=$(find . -maxdepth 2 -type d -name "* *" -not -path "./.git/*" 2>/dev/null)
          if [ -n "$BAD_DIRS" ]; then
            echo "WARNING: Directories with spaces found:"
            echo "$BAD_DIRS"
          fi
          echo "Structure check complete."
